name: ❓ Unused dependencies

on:
  push:
    branches:
      - master
      - dev
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ❓ Unused dependencies
    runs-on: ubuntu-latest

    steps:
      - name: ✨ Set up the toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          override: true

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: ✨ Install udeps
        uses: actions-rs/cargo@v1
        with:
          command: install
          args: cargo-udeps

      - name: ❓ Udeps
        uses: actions-rs/cargo@v1
        with:
          command: udeps
